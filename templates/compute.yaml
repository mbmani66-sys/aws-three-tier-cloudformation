AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Auto Scaling and Load Balancer

Resources:

  WebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Web Security Group
      VpcId:
        Fn::ImportValue: ProjectVpc

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  LaunchTemplate:

    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateData:

        ImageId: ami-084568db4383264d4

        InstanceType: t2.micro

        SecurityGroupIds:

          - !Ref WebSG

        UserData:

          Fn::Base64: |

            #!/bin/bash

            yum update -y

            yum install -y httpd

            systemctl enable httpd

            systemctl start httpd

            echo "<h1>CloudFormation + ASG</h1>" > /var/www/html/index.html

  TargetGroup:

    Type: AWS::ElasticLoadBalancingV2::TargetGroup

    Properties:

      Port: 80

      Protocol: HTTP

      VpcId:
        Fn::ImportValue: ProjectVpc

  LoadBalancer:

    Type: AWS::ElasticLoadBalancingV2::LoadBalancer

    Properties:

      Scheme: internet-facing

      Subnets:

        - Fn::ImportValue: PublicSubnet1

        - Fn::ImportValue: PublicSubnet2

      SecurityGroups:

        - !Ref WebSG

  Listener:

    Type: AWS::ElasticLoadBalancingV2::Listener

    Properties:

      LoadBalancerArn: !Ref LoadBalancer

      Port: 80

      Protocol: HTTP

      DefaultActions:

        - Type: forward

          TargetGroupArn: !Ref TargetGroup

  AutoScalingGroup:

    Type: AWS::AutoScaling::AutoScalingGroup

    Properties:

      VPCZoneIdentifier:

        - Fn::ImportValue: PublicSubnet1

        - Fn::ImportValue: PublicSubnet2

      MinSize: 2

      MaxSize: 4

      DesiredCapacity: 2

      TargetGroupARNs:

        - !Ref TargetGroup

      LaunchTemplate:

        LaunchTemplateId: !Ref LaunchTemplate

        Version: !GetAtt LaunchTemplate.LatestVersionNumber
